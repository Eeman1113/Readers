<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Readers — Live Swarm Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #06060b;
  color: #ededf4;
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}
canvas { position: fixed; inset: 0; z-index: 0; }

.overlay {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}

.title-group { text-align: center; margin-bottom: 40px; }
.bee { font-size: 4rem; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight: 700;
  background: linear-gradient(135deg, #ededf4 30%, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1.1; margin-bottom: 8px;
}
.subtitle {
  font-size: 1.1rem; color: #7878a0; letter-spacing: 0.1em;
  text-transform: uppercase; font-weight: 300;
}

.stats-bar {
  display: flex; gap: 40px; margin-top: 48px;
  font-family: 'JetBrains Mono', monospace;
}
.stat { text-align: center; }
.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3rem; font-weight: 700; color: #ff6b6b;
  line-height: 1; text-shadow: 0 0 30px rgba(255,107,107,0.3);
}
.stat-label {
  font-size: 0.65rem; color: #4a4a6a; text-transform: uppercase;
  letter-spacing: 0.15em; margin-top: 4px;
}

.status-line {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  z-index: 2; font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: #7878a0;
  display: flex; align-items: center; gap: 10px;
}
.pulse {
  width: 8px; height: 8px; border-radius: 50%; background: #ff6b6b;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
  50% { opacity: 0.6; box-shadow: 0 0 0 12px rgba(255,107,107,0); } }

.platform-badges {
  position: fixed; top: 30px; right: 30px; z-index: 2;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}
.p-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  padding: 5px 12px; border-radius: 8px; background: rgba(13,13,22,0.8);
  border: 1px solid #1f1f35; color: #7878a0;
  display: flex; align-items: center; gap: 8px;
  opacity: 0; animation: slideIn 0.5s ease forwards;
}
.p-badge .emoji { font-size: 1rem; }
.p-badge .count { color: #ededf4; font-weight: 500; }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<canvas id="swarm"></canvas>

<div class="overlay">
  <div class="title-group">
    <div class="bee">🐝</div>
    <h1>Readers</h1>
    <div class="subtitle">Up to 500,000 AI Readers Judging Your Book</div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="readerCount">0</div>
      <div class="stat-label">Readers Active</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="avgRating">—</div>
      <div class="stat-label">Avg Rating</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="roundNum">1</div>
      <div class="stat-label">Current Round</div>
    </div>
  </div>
</div>

<div class="status-line">
  <span class="pulse"></span>
  <span id="statusText">Initializing swarm...</span>
</div>

<div class="platform-badges" id="badges"></div>

<script>
// === SWARM SIMULATION ===
const canvas = document.getElementById('swarm');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

const COLORS = {
  BookTok: '#ff2d55', Goodreads: '#c9a84c', Reddit: '#ff4500',
  Bookstagram: '#c13584', X_Twitter: '#1da1f2', Lurker: '#4a4a6a'
};
const PLATFORM_EMOJI = {
  BookTok: '📱', Goodreads: '📚', Reddit: '💬',
  Bookstagram: '📸', X_Twitter: '𝕏', Lurker: '👻'
};
const PLATFORMS = ['BookTok','Goodreads','Reddit','Bookstagram','X_Twitter','Lurker'];
const WEIGHTS = [0.30, 0.25, 0.15, 0.15, 0.10, 0.05];

const particles = [];
// Read settings from URL params (passed by readers.py)
const urlParams = new URLSearchParams(window.location.search);
const MAX_PARTICLES = Math.min(parseInt(urlParams.get('readers')) || 1000, 2000); // Cap visual particles at 2000
const TOTAL_READERS = parseInt(urlParams.get('readers')) || 1000;
const TOTAL_ROUNDS = parseInt(urlParams.get('rounds')) || 3;
const GENRE = urlParams.get('genre') || 'general';
const PROVIDER = urlParams.get('provider') || 'AI';

class Particle {
  constructor() {
    this.reset();
    // Start from random edge
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { this.x = Math.random() * canvas.width; this.y = -10; }
    else if (edge === 1) { this.x = canvas.width + 10; this.y = Math.random() * canvas.height; }
    else if (edge === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + 10; }
    else { this.x = -10; this.y = Math.random() * canvas.height; }
  }

  reset() {
    // Pick platform by weight
    const r = Math.random(); let cum = 0;
    for (let i = 0; i < PLATFORMS.length; i++) {
      cum += WEIGHTS[i];
      if (r <= cum) { this.platform = PLATFORMS[i]; break; }
    }
    this.platform = this.platform || 'Lurker';
    this.color = COLORS[this.platform];
    this.targetX = canvas.width * 0.2 + Math.random() * canvas.width * 0.6;
    this.targetY = canvas.height * 0.2 + Math.random() * canvas.height * 0.6;
    this.size = Math.random() * 2.5 + 1;
    this.speed = Math.random() * 0.02 + 0.005;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.02 + 0.01;
    this.wobbleAmp = Math.random() * 30 + 10;
    this.opacity = Math.random() * 0.5 + 0.3;
    this.arrived = false;
    this.rating = null; // Will be set when "reading"
  }

  update() {
    // Move toward target with wobble
    const dx = this.targetX - this.x;
    const dy = this.targetY - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 5) {
      this.x += dx * this.speed;
      this.y += dy * this.speed;
      this.wobble += this.wobbleSpeed;
      this.x += Math.sin(this.wobble) * this.wobbleAmp * 0.02;
      this.y += Math.cos(this.wobble * 0.7) * this.wobbleAmp * 0.015;
    } else {
      this.arrived = true;
      // Gentle drift
      this.wobble += this.wobbleSpeed;
      this.x += Math.sin(this.wobble) * 0.3;
      this.y += Math.cos(this.wobble * 0.7) * 0.2;
    }
  }

  draw() {
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();

    // Glow
    ctx.globalAlpha = this.opacity * 0.15;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// === CONNECTION LINES ===
function drawConnections() {
  const arrived = particles.filter(p => p.arrived);
  if (arrived.length < 2) return;

  ctx.globalAlpha = 0.03;
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth = 0.5;

  for (let i = 0; i < Math.min(arrived.length, 200); i++) {
    const a = arrived[i];
    for (let j = i + 1; j < Math.min(arrived.length, 200); j++) {
      const b = arrived[j];
      const dx = a.x - b.x; const dy = a.y - b.y;
      const dist = dx*dx + dy*dy;
      if (dist < 8000) {
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 1;
}

// === SPAWN LOGIC ===
let spawnRate = 0;
let totalSpawned = 0;
let currentRound = 1;
let currentRating = 0;
const platformCounts = {};

const readerLabel = TOTAL_READERS.toLocaleString();
const statuses = [
  [0, 'Initializing swarm...'],
  [Math.floor(MAX_PARTICLES * 0.05), `Deploying ${readerLabel} reader personas across platforms...`],
  [Math.floor(MAX_PARTICLES * 0.20), 'BookTok readers arriving...'],
  [Math.floor(MAX_PARTICLES * 0.40), 'Goodreads reviewers engaging...'],
  [Math.floor(MAX_PARTICLES * 0.60), 'Reddit skeptics joining the conversation...'],
  [Math.floor(MAX_PARTICLES * 0.75), 'Bookstagram capturing aesthetic vibes...'],
  [Math.floor(MAX_PARTICLES * 0.85), 'X/Twitter dropping hot takes...'],
  [Math.floor(MAX_PARTICLES * 0.95), 'Lurkers silently observing...'],
  [MAX_PARTICLES, `All ${readerLabel} readers active. Simulating ${TOTAL_ROUNDS} rounds via ${PROVIDER}...`],
];

function updateStats() {
  document.getElementById('readerCount').textContent = Math.min(totalSpawned, MAX_PARTICLES);
  if (currentRating > 0) {
    document.getElementById('avgRating').textContent = currentRating.toFixed(1) + '★';
  }
  document.getElementById('roundNum').textContent = currentRound;

  for (const [count, text] of statuses) {
    if (totalSpawned >= count) {
      document.getElementById('statusText').textContent = text;
    }
  }
}

function updateBadges() {
  const el = document.getElementById('badges');
  let html = '';
  for (const plat of PLATFORMS) {
    const count = platformCounts[plat] || 0;
    if (count > 0) {
      html += `<div class="p-badge" style="animation-delay:${PLATFORMS.indexOf(plat)*0.1}s;border-color:${COLORS[plat]}30">
        <span class="emoji">${PLATFORM_EMOJI[plat]}</span>
        <span>${plat.replace('_','/')}</span>
        <span class="count">${count}</span>
      </div>`;
    }
  }
  el.innerHTML = html;
}

// === ANIMATION LOOP ===
let frame = 0;
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Spawn particles gradually
  if (totalSpawned < MAX_PARTICLES) {
    // Accelerate spawn rate over time
    const spawnThisFrame = frame < 60 ? 1 : frame < 180 ? 3 : frame < 360 ? 5 : 2;
    for (let i = 0; i < spawnThisFrame && totalSpawned < MAX_PARTICLES; i++) {
      const p = new Particle();
      particles.push(p);
      totalSpawned++;
      platformCounts[p.platform] = (platformCounts[p.platform] || 0) + 1;
    }
  }

  // Simulate rating changes
  if (frame === 300) { currentRating = 3.2; currentRound = 1; }
  if (frame === 600) { currentRating = 3.5; currentRound = 2; }
  if (frame === 900) { currentRating = 3.7; currentRound = 3; }
  if (frame === 1200) { currentRating = 3.8; currentRound = 4; }
  if (frame === 1500) { currentRating = 4.0; currentRound = 5; }

  drawConnections();
  for (const p of particles) { p.update(); p.draw(); }

  if (frame % 10 === 0) updateStats();
  if (frame % 30 === 0) updateBadges();

  frame++;
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
